<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TidyCars — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #00e5a0;
    --accent2: #005eff;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --warning: #ffb84d;
    --danger: #ff4d6a;
    --success: #00e5a0;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(ellipse at 60% 40%, #001a4d 0%, var(--bg) 70%);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 380px;
    text-align: center;
  }

  .login-logo {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 22px;
  }

  .login-box h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .login-box p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .login-box input {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.85; }
  #login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .topbar h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .topbar-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-run {
    padding: 8px 18px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-run:hover { opacity: 0.85; }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-logout {
    padding: 8px 16px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* ── MAIN ── */
  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 80px;
    right: 32px;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.3s;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { background: #003d2a; border: 1px solid var(--accent); color: var(--accent); }
  #toast.error { background: #3d0010; border: 1px solid var(--danger); color: var(--danger); }

  /* ── STAT CARDS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.blue { color: #5b9eff; }
  .stat-value.warning { color: var(--warning); }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── SECTION ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 10px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  /* ── GRID ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  /* ── ASSIGNMENT CARDS ── */
  .assignments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .assignment-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    transition: border-color 0.2s;
  }

  .assignment-card:hover { border-color: var(--accent); }

  .assignment-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .customer-name {
    font-size: 15px;
    font-weight: 600;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-assigned { background: #001a4d; color: #5b9eff; border: 1px solid #003399; }
  .badge-completed { background: #003d2a; color: var(--accent); border: 1px solid #006644; }

  .assignment-detail {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    font-size: 13px;
    color: var(--muted);
  }

  .assignment-detail .icon { font-size: 14px; }
  .assignment-detail .val { color: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .washer-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .washer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── WASHER LOAD ── */
  .washer-item {
    margin-bottom: 20px;
  }

  .washer-item:last-child { margin-bottom: 0; }

  .washer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .washer-name { font-size: 14px; font-weight: 500; }

  .washer-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  .progress-fill.half { background: var(--warning); }
  .progress-fill.full { background: var(--danger); }

  /* ── LAST RUN ── */
  .last-run {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 8px;
  }

  /* ── REFRESH ── */
  .refresh-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }

  .btn-refresh {
    padding: 6px 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 16px;
    margin-bottom: 8px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🚗</div>
    <h2>TidyCars Admin</h2>
    <p>Operations Control Panel</p>
    <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">🚗</div>
      <h1>TidyCars</h1>
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <button class="btn-run" id="run-btn" onclick="runScheduler()">
        ▶ Run Scheduler
      </button>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- STATS -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">Active Subscriptions</div>
        <div class="stat-value accent" id="stat-subs">—</div>
        <div class="stat-sub">Premium Plan · ₹999/mo</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Washers</div>
        <div class="stat-value blue" id="stat-washers">—</div>
        <div class="stat-sub">Zone 1 · Gomti Nagar</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Assignments Today</div>
        <div class="stat-value warning" id="stat-today">—</div>
        <div class="stat-sub" id="stat-date">—</div>
      </div>
    </div>

    <!-- TODAY'S ASSIGNMENTS -->
    <div class="card" style="margin-bottom: 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div class="section-title">📋 <span id="assign-count">0</span> Today's Assignments</div>
        <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      </div>
      <div id="assignments-container">
        <div class="skeleton"></div>
        <div class="skeleton" style="width:70%"></div>
      </div>
    </div>

    <!-- WASHER LOAD + HEALTH -->
    <div class="two-col">

      <div class="card">
        <div class="section-title" style="margin-bottom:20px;">⚡ Washer Load</div>
        <div id="washer-load-container">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title" style="margin-bottom:20px;">🛡 System Health</div>
        <div id="health-container">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
const BASE = "https://uckgehcuplkfqtncyyff.supabase.co"
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVja2dlaGN1cGxrZnF0bmN5eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTAyNDksImV4cCI6MjA4NjQ4NjI0OX0.89102EDvJFwC0NS7txqq3EWnPCY87tSrBGOPRvLdfU8"
const PASS = "tidycars@admin2026"

const headers = { "apikey": KEY, "Authorization": `Bearer ${KEY}` }

async function get(table) {
  const r = await fetch(`${BASE}/rest/v1/${table}?select=*`, { headers })
  return r.json()
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = `show ${type}`
  setTimeout(() => { t.className = '' }, 3500)
}

function doLogin() {
  const pass = document.getElementById('admin-pass').value
  const err  = document.getElementById('login-error')
  if (pass === PASS) {
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    loadData()
  } else {
    err.textContent = 'Incorrect password.'
    document.getElementById('admin-pass').value = ''
  }
}

function doLogout() {
  document.getElementById('dashboard').style.display = 'none'
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('admin-pass').value = ''
}

async function runScheduler() {
  const btn = document.getElementById('run-btn')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Running...'
  const r = await fetch(`${BASE}/rest/v1/rpc/run_daily_scheduler`, {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  })
  btn.disabled = false
  btn.innerHTML = '▶ Run Scheduler'
  if (r.ok) {
    showToast('✅ Scheduler executed successfully', 'success')
    loadData()
  } else {
    showToast('❌ Scheduler failed', 'error')
  }
}

async function loadData() {
  const [assignments, load, health] = await Promise.all([
    get('today_assignments'),
    get('today_washer_load'),
    get('system_health')
  ])
  renderStats(health[0])
  renderAssignments(assignments)
  renderWasherLoad(load)
  renderHealth(health[0])
}

function renderStats(h) {
  if (!h) return
  document.getElementById('stat-subs').textContent    = h.active_subscriptions
  document.getElementById('stat-washers').textContent = h.active_washers
  document.getElementById('stat-today').textContent   = h.assignments_today
  document.getElementById('stat-date').textContent    = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' })
}

function renderAssignments(data) {
  const el = document.getElementById('assignments-container')
  const count = document.getElementById('assign-count')
  count.textContent = data.length

  if (!data.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>No assignments for today.<br>Run the scheduler to generate jobs.</p>
      </div>`
    return
  }

  el.innerHTML = `<div class="assignments-grid">${data.map(a => `
    <div class="assignment-card">
      <div class="assignment-header">
        <div class="customer-name">${a.customer_name || 'Customer'}</div>
        <span class="status-badge badge-assigned">Assigned</span>
      </div>
      <div class="assignment-detail"><span class="icon">📍</span><span class="val">${a.locality || '—'}</span></div>
      <div class="assignment-detail"><span class="icon">🏠</span><span>${a.address || '—'}</span></div>
      <div class="assignment-detail"><span class="icon">🚗</span><span class="val">${a.car_model || '—'} · ${a.car_number || '—'}</span></div>
      <div class="divider"></div>
      <div class="washer-tag">
        <div class="washer-dot"></div>
        ${a.washer_name || '—'}
      </div>
    </div>`).join('')}</div>`
}

function renderWasherLoad(data) {
  const el = document.getElementById('washer-load-container')
  if (!data.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">No washer data.</p>'; return }
  el.innerHTML = data.map(w => {
    const pct = Math.round((w.assigned_today / w.max_daily_capacity) * 100)
    const cls = pct >= 100 ? 'full' : pct >= 60 ? 'half' : ''
    return `
      <div class="washer-item">
        <div class="washer-row">
          <span class="washer-name">${w.full_name}</span>
          <span class="washer-count">${w.assigned_today} / ${w.max_daily_capacity}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${cls}" style="width:${pct}%"></div>
        </div>
      </div>`
  }).join('')
}

function renderHealth(h) {
  const el = document.getElementById('health-container')
  if (!h) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">No data.</p>'; return }
  el.innerHTML = `
    <div style="display:grid;gap:14px;">
      <div style="display:flex;justify-content:space-between;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
        <span style="font-size:13px;color:var(--muted);">Active Subscriptions</span>
        <span style="font-family:'DM Mono',monospace;color:var(--accent);">${h.active_subscriptions}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
        <span style="font-size:13px;color:var(--muted);">Active Washers</span>
        <span style="font-family:'DM Mono',monospace;color:#5b9eff;">${h.active_washers}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
        <span style="font-size:13px;color:var(--muted);">Jobs Today</span>
        <span style="font-family:'DM Mono',monospace;color:var(--warning);">${h.assignments_today}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
        <span style="font-size:13px;color:var(--muted);">System Status</span>
        <span style="font-size:12px;font-weight:600;color:var(--accent);">● OPERATIONAL</span>
      </div>
    </div>`
}
</script>
</body>
</html>
