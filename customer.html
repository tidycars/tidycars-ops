<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TidyCars Subscription</title>
<style>
body { font-family: Arial; margin: 40px; background: #f4f4f4; }
h1 { color: #222; }
.card { background: white; padding: 25px; border-radius: 8px; max-width: 500px; }
label { display: block; margin-top: 14px; font-weight: bold; font-size: 13px; color: #444; }
input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
.days { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.days label { font-weight: normal; display: flex; align-items: center; gap: 4px; margin: 0; font-size: 13px; }
button { width: 100%; padding: 12px; margin-top: 20px; background: #000; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
button:hover { background: #333; }
#msg { margin-top: 12px; font-size: 14px; }
.success { color: green; }
.error { color: red; }
</style>
</head>
<body>
<h1>TidyCars Subscription</h1>
<div class="card">

  <label>Full Name</label>
  <input id="name" placeholder="e.g. Rahul Sharma">

  <label>Phone</label>
  <input id="phone" placeholder="10-digit mobile number">

  <label>Email</label>
  <input id="email" type="email" placeholder="rahul@email.com">

  <label>Locality</label>
  <input id="locality" placeholder="e.g. Gomti Nagar">

  <label>Full Address</label>
  <input id="address" placeholder="House no, street, area">

  <label>Car Model</label>
  <input id="car_model" placeholder="e.g. Maruti Swift">

  <label>Car Number</label>
  <input id="car_number" placeholder="e.g. UP32 AB 1234">

  <label>Zone</label>
  <select id="zone">
    <option value="zone_1">Zone 1 — Gomti Nagar</option>
  </select>

  <label>Preferred Wash Days</label>
  <div class="days">
    <label><input type="checkbox" value="0"> Sun</label>
    <label><input type="checkbox" value="1"> Mon</label>
    <label><input type="checkbox" value="2"> Tue</label>
    <label><input type="checkbox" value="3"> Wed</label>
    <label><input type="checkbox" value="4"> Thu</label>
    <label><input type="checkbox" value="5"> Fri</label>
    <label><input type="checkbox" value="6"> Sat</label>
  </div>

  <button onclick="createSubscription()">Start Subscription</button>
  <div id="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://uckgehcuplkfqtncyyff.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVja2dlaGN1cGxrZnF0bmN5eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTAyNDksImV4cCI6MjA4NjQ4NjI0OX0.89102EDvJFwC0NS7txqq3EWnPCY87tSrBGOPRvLdfU8"

async function createSubscription() {
  const msg = document.getElementById("msg")
  msg.innerHTML = ""

  const name       = document.getElementById("name").value.trim()
  const phone      = document.getElementById("phone").value.trim()
  const email      = document.getElementById("email").value.trim()
  const locality   = document.getElementById("locality").value.trim()
  const address    = document.getElementById("address").value.trim()
  const car_model  = document.getElementById("car_model").value.trim()
  const car_number = document.getElementById("car_number").value.trim()
  const zone       = document.getElementById("zone").value

  const checked = document.querySelectorAll(".days input[type=checkbox]:checked")
  const preferred_weekdays = Array.from(checked).map(c => parseInt(c.value))

  // Validation
  if (!name || !phone || !zone) {
    msg.innerHTML = '<span class="error">Name, phone and zone are required.</span>'
    return
  }
  if (preferred_weekdays.length === 0) {
    msg.innerHTML = '<span class="error">Please select at least one wash day.</span>'
    return
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_subscription`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      p_customer_name:    name,
      p_phone:            phone,
      p_email:            email,
      p_locality:         locality,
      p_address:          address,
      p_car_model:        car_model,
      p_car_number:       car_number,
      p_zone:             zone,
      p_preferred_weekdays: preferred_weekdays
    })
  })

  const data = await res.json()

  if (!res.ok || data.error) {
    msg.innerHTML = `<span class="error">Error: ${data.message || JSON.stringify(data)}</span>`
    return
  }

  msg.innerHTML = `<span class="success">✅ Subscription created successfully!</span>`

  // Clear form
  document.getElementById("name").value = ""
  document.getElementById("phone").value = ""
  document.getElementById("email").value = ""
  document.getElementById("locality").value = ""
  document.getElementById("address").value = ""
  document.getElementById("car_model").value = ""
  document.getElementById("car_number").value = ""
  document.querySelectorAll(".days input[type=checkbox]").forEach(c => c.checked = false)
}
</script>
</body>
</html>
