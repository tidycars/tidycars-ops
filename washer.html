<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TidyCars — Washer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #00e5a0;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --danger: #ff4d6a;
    --warning: #ffb84d;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(ellipse at 40% 60%, #00261a 0%, var(--bg) 70%);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 380px;
    text-align: center;
  }

  .login-logo {
    width: 56px;
    height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 26px;
  }

  .login-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .input-group { margin-bottom: 12px; text-align: left; }
  .input-group label { font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }

  .login-box input {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.85; }
  #login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* DASHBOARD */
  #dashboard { display: none; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 64px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .topbar h1 { font-size: 16px; font-weight: 600; }

  .washer-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .topbar-right { display: flex; gap: 10px; align-items: center; }

  .btn-load {
    padding: 8px 18px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-load:hover { opacity: 0.85; }

  .btn-logout {
    padding: 8px 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* MAIN */
  .main { padding: 28px 24px; max-width: 900px; margin: 0 auto; }

  /* WELCOME CARD */
  .welcome-card {
    background: linear-gradient(135deg, #001a0f, #002b1a);
    border: 1px solid #003d22;
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .welcome-text h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .welcome-text p { color: var(--muted); font-size: 14px; }

  .welcome-stats { display: flex; gap: 24px; }

  .wstat { text-align: center; }
  .wstat-val { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .wstat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }

  /* JOB CARDS */
  .jobs-list { display: flex; flex-direction: column; gap: 14px; }

  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .job-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .job-card.completed { opacity: 0.5; }
  .job-card.completed::before { background: var(--muted); }
  .job-card:hover { border-color: #3a3a50; }

  .job-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .job-number {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }

  .job-customer { font-size: 18px; font-weight: 600; }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-assigned { background: #001a4d; color: #5b9eff; border: 1px solid #003399; }
  .badge-done { background: #003d2a; color: var(--accent); border: 1px solid #006644; }

  .job-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .detail-item { }
  .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .detail-value { font-size: 14px; font-weight: 500; }

  .car-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--warning);
  }

  .btn-complete {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-complete:hover { background: var(--accent); color: #000; }
  .btn-complete:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { color: var(--muted); font-size: 14px; }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .welcome-card { flex-direction: column; gap: 20px; }
    .job-details { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🧹</div>
    <h2>Washer Login</h2>
    <p>Enter your credentials to see today's jobs</p>
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="login-phone" placeholder="9000000000" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="input-group">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">🚗</div>
      <h1>TidyCars</h1>
      <span class="washer-pill" id="washer-name-pill">—</span>
    </div>
    <div class="topbar-right">
      <button class="btn-load" onclick="loadJobs()">↻ Refresh Jobs</button>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="welcome-card">
      <div class="welcome-text">
        <h2 id="welcome-msg">Good morning!</h2>
        <p id="welcome-date">—</p>
      </div>
      <div class="welcome-stats">
        <div class="wstat">
          <div class="wstat-val" id="jobs-count">0</div>
          <div class="wstat-label">Jobs Today</div>
        </div>
        <div class="wstat">
          <div class="wstat-val" id="done-count">0</div>
          <div class="wstat-label">Completed</div>
        </div>
      </div>
    </div>

    <div class="section-title">Today's Jobs</div>
    <div id="jobs-container">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>Loading jobs...</h3>
        <p>Fetching your assignments</p>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = "https://uckgehcuplkfqtncyyff.supabase.co"
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVja2dlaGN1cGxrZnF0bmN5eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTAyNDksImV4cCI6MjA4NjQ4NjI0OX0.89102EDvJFwC0NS7txqq3EWnPCY87tSrBGOPRvLdfU8"
const H = { "apikey": KEY, "Authorization": `Bearer ${KEY}` }

let currentWasher = null
let jobData = {}

function greeting() {
  const h = new Date().getHours()
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'
}

async function doLogin() {
  const phone = document.getElementById('login-phone').value.trim()
  const pin   = document.getElementById('login-pin').value.trim()
  const err   = document.getElementById('login-error')
  err.textContent = ''

  if (!phone || !pin) { err.textContent = 'Enter phone and PIN.'; return }

  const r = await fetch(`${BASE}/rest/v1/washers?phone=eq.${phone}&pin=eq.${pin}&is_active=eq.true&select=id,full_name`, { headers: H })
  const data = await r.json()

  if (!data.length) { err.textContent = 'Invalid phone or PIN.'; return }

  currentWasher = data[0]
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  document.getElementById('washer-name-pill').textContent = currentWasher.full_name
  document.getElementById('welcome-msg').textContent = `${greeting()}, ${currentWasher.full_name.split(' ')[0]}!`
  document.getElementById('welcome-date').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
  loadJobs()
}

async function loadJobs() {
  if (!currentWasher) return
  const r = await fetch(`${BASE}/rest/v1/today_assignments?washer_id=eq.${currentWasher.id}&select=*`, { headers: H })
  const data = await r.json()

  document.getElementById('jobs-count').textContent = data.length
  document.getElementById('done-count').textContent = 0
  jobData = {}
  data.forEach(job => { jobData[job.id] = job })

  const el = document.getElementById('jobs-container')

  if (!data.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✅</div>
        <h3>No jobs today</h3>
        <p>You have no assignments for today.<br>Check back after the scheduler runs.</p>
      </div>`
    return
  }

  el.innerHTML = `<div class="jobs-list">${data.map((job, i) => `
    <div class="job-card" id="card-${job.id}">
      <div class="job-top">
        <div>
          <div class="job-number">Job ${i + 1} of ${data.length}</div>
          <div class="job-customer">${job.customer_name || '—'}</div>
        </div>
        <span class="status-badge badge-assigned" id="badge-${job.id}">Assigned</span>
      </div>
      <div class="job-details">
        <div class="detail-item">
          <div class="detail-label">📍 Locality</div>
          <div class="detail-value">${job.locality || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">🗓 Date</div>
          <div class="detail-value">${job.scheduled_date || '—'}</div>
        </div>
        <div class="detail-item" style="grid-column: span 2;">
          <div class="detail-label">🏠 Address</div>
          <div class="detail-value">${job.address || '—'}</div>
        </div>
        <div class="detail-item" style="grid-column: span 2;">
          <div class="detail-label">🚗 Vehicle</div>
          <div class="car-badge">${job.car_model || '—'} &nbsp;·&nbsp; ${job.car_number || '—'}</div>
        </div>
      </div>
      <button class="btn-complete" id="btn-${job.id}" onclick="completeJob('${job.id}')">
        ✓ Mark as Completed
      </button>
    </div>`).join('')}</div>`
}

async function completeJob(id) {
  const btn  = document.getElementById(`btn-${id}`)
  const card = document.getElementById(`card-${id}`)
  const badge = document.getElementById(`badge-${id}`)

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'

  const r = await fetch(`${BASE}/rest/v1/assignments?id=eq.${id}`, {
    method: 'PATCH',
    headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ status: 'completed' })
  })

  if (r.ok) {
    badge.className = 'status-badge badge-done'
    badge.textContent = 'Completed'
    btn.textContent = '✓ Done'
    card.classList.add('completed')
    const done = document.getElementById('done-count')
    done.textContent = parseInt(done.textContent) + 1

    // Fire WhatsApp to customer
    const job = jobData[id]
    if (job) {
      fetch(`${BASE}/functions/v1/send-whatsapp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEY}` },
        body: JSON.stringify({
          type: 'job_completed',
          data: {
            customer_name: job.customer_name,
            phone: job.customer_phone,
            washer_name: currentWasher.full_name,
            car_model: job.car_model
          }
        })
      }).catch(e => console.log('WhatsApp failed:', e))
    }
  } else {
    btn.disabled = false
    btn.textContent = '✗ Failed — tap to retry'
  }
}

function doLogout() {
  currentWasher = null
  document.getElementById('dashboard').style.display = 'none'
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('login-phone').value = ''
  document.getElementById('login-pin').value = ''
}
</script>
</body>
</html>
